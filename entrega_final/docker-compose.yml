version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: usuario_trino
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: base_datos_grupo
    ports:
      - "5432:5432"
    volumes:
      # Esta línea es la que faltaba para cargar tu init.sql
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - trino-net

  trino-coordinator:
    image: trinodb/trino:451
    container_name: trino-coordinator
    ports:
      - "8080:8080"
    volumes:
      - ./coordinator/etc:/etc/trino
      - ./datalake:/opt/datalake
    networks:
      - trino-net

  trino-worker-1:
    image: trinodb/trino:451
    container_name: trino-worker-1
    volumes:
      - ./worker1/etc:/etc/trino
      - ./datalake:/opt/datalake
    depends_on:
      - trino-coordinator
    networks:
      - trino-net

  trino-worker-2:
    image: trinodb/trino:451
    container_name: trino-worker-2
    volumes:
      - ./worker2/etc:/etc/trino
      - ./datalake:/opt/datalake
    depends_on:
      - trino-coordinator
    networks:
      - trino-net
      
networks:
  trino-net:
    driver: bridge